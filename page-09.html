  var NEXT = "page-10.html";
  var IS_FINAL = false;
  var KIRVANO = "https://pay.kirvano.com/15a92c3a-2c81-4a96-89fe-8f06e974543a?aff=041e3302-3ca0-4dd8-911d-ade9b91b0532";

  function looksLikeAnswer(el) {
    var cls = (el.className || "").toLowerCase();
    var ds = el.dataset || {}
    return /(option|answer|resposta|op[cç]ao|opt)/.test(cls) || ds.answer !== undefined || ds.option !== undefined;
  }

  function looksLikeCTA(el) {
    var t = (el.innerText || "").toLowerCase();
    return /(comprar|quero|acessar|transforma|transforma[cç][aã]o|plano|agora|garantia|oferta|checkout)/.test(t);
  }

  document.addEventListener('DOMContentLoaded', function() {
    // 1) Fluxo linear: respostas/itens de pergunta levam à próxima página
    if (NEXT) {
      var candidates = Array.from(document.querySelectorAll('button, a, .btn, .button, [role="button"], input[type="button"], input[type="submit"], .option, .answer'));
      candidates.forEach(function(el) {
        var tag = (el.tagName || '').toLowerCase();
        var isLink = tag === 'a';
        var href = isLink ? (el.getAttribute('href') || '') : '';
        // Para elementos de pergunta/opção ou botões genéricos sem href externo, avança
        if (looksLikeAnswer(el) || (!isLink || (href && !href.startsWith('http')))) {
          el.addEventListener('click', function(e) {
            e.preventDefault();
            if (NEXT) window.location.href = NEXT;
          }, true);
        }
      });
    }

    // 2) CTAs finais: só na página final forçar Kirvano
    var allActs = Array.from(document.querySelectorAll('a, button, [role="button"], input[type="button"], input[type="submit"]'));
    allActs.forEach(function(el) {
      var tag = (el.tagName || '').toLowerCase();
      var isLink = tag === 'a';
      // Se não for CTA, ignora
      if (!looksLikeCTA(el)) return;

      if (IS_FINAL) {
        // Página final -> redireciona para pagamento
        if (isLink) el.setAttribute('href', KIRVANO);
        el.addEventListener('click', function(e) { e.preventDefault(); window.location.href = KIRVANO; }, true);
      } else {
        // Páginas anteriores -> NUNCA vão para o pagamento; sempre seguem fluxo
        if (isLink) el.setAttribute('href', NEXT || '#');
        el.addEventListener('click', function(e) { 
          if (NEXT) { e.preventDefault(); window.location.href = NEXT; }
        }, true);
      }
    });

    // 3) Sanitizar links diretos para pay.kirvano nas páginas que não são finais
    if (!IS_FINAL) {
      Array.from(document.querySelectorAll('a[href*="pay.kirvano"]')).forEach(function(el) {
        el.setAttribute('href', NEXT || '#');
        el.addEventListener('click', function(e){ if (NEXT) { e.preventDefault(); window.location.href = NEXT; } }, true);
      });
    }
  });
})();
</script>
